services:
  db:
    image: mysql:8.0
    container_name: career_compass_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: career_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: dev_user
      MYSQL_PASSWORD: dev_password
    volumes:
      - ./db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "dev_user", "-pdev_password" ]
      timeout: 5s
      retries: 10
      interval: 10s

  backend:
    build: ./backend
    container_name: career_compass_api
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+mysqlconnector://dev_user:dev_password@db:3306/career_db?charset=utf8mb4
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: career_compass_ui
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
